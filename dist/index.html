
<!DOCTYPE html>
<html>
<head>
  <title>Smart Todo</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Fira+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme') || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        
        var isActive = localStorage.getItem('custom_theme_active') === 'true';
        if (isActive) {
          document.documentElement.classList.add('custom-theme');
          var saved = localStorage.getItem('todo_theme_config');
          if (saved) {
            var cfg = JSON.parse(saved);
            var root = document.documentElement;
            if (cfg.primaryColor)    root.style.setProperty('--primary-color', cfg.primaryColor);
            if (cfg.bgColor)         root.style.setProperty('--bg-color', cfg.bgColor);
            if (cfg.sidebarColor)    root.style.setProperty('--sidebar-color', cfg.sidebarColor);
            if (cfg.cardColor)       root.style.setProperty('--card-color', cfg.cardColor);
            if (cfg.headingColor)    root.style.setProperty('--heading-color', cfg.headingColor);
            if (cfg.textColor)       root.style.setProperty('--text-color', cfg.textColor);
            if (cfg.buttonBgColor)   root.style.setProperty('--button-bg-color', cfg.buttonBgColor);
            if (cfg.buttonTextColor) root.style.setProperty('--button-text-color', cfg.buttonTextColor);
            if (cfg.fontSize)        root.style.setProperty('--base-font-size', cfg.fontSize);
            if (cfg.fontFamily)      root.style.setProperty('--font-family', cfg.fontFamily);
            if (cfg.borderRadius)    root.style.setProperty('--border-radius', cfg.borderRadius);
            
            if (cfg.enableFontFamily !== false) root.classList.add('theme-font-family');
            root.classList.add('theme-font-size');
            if (cfg.enableBorderRadius !== false) root.classList.add('theme-border-radius');
            if (cfg.enableColors) root.classList.add('theme-colors');
          }
        }
      } catch (e) {}
    })();
  </script>
  <script type="module" crossorigin src="/assets/index-DMEf-asp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Ch4wALb1.css">
</head>
<body class="bg-gray-100 dark:bg-slate-900 transition-colors duration-300">
  <div id="root"></div>
</body>
</html>
