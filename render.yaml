services:
  - type: web
    name: todo-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # DATABASE - PostgreSQL connection
      # Set the values in the Render dashboard (Environment tab).
      # DB_URL example (for external PostgreSQL):
      #   jdbc:postgresql://HOST:PORT/DATABASE?sslmode=require
      # DB_DRIVER example: org.postgresql.Driver
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DRIVER
        value: org.postgresql.Driver

      # EMAIL Configuration
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # GOOGLE OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
