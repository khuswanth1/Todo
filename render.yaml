databases:
  - name: todo-db
    plan: free

services:
  - type: web
    name: todo-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # DATABASE - Automatically linked PostgreSQL database
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString

      # EMAIL Configuration
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # GOOGLE OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
