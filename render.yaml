services:
  - type: web
    name: todo-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # EMAIL Configuration (Optional - set in Render dashboard)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # GOOGLE OAuth (Optional - set in Render dashboard)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
