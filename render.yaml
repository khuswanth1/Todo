services:
  - type: web
    name: todo-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # DATABASE - MySQL connection
      # Render has no managed MySQL, use external service:
      # - Aiven (free tier available)
      # - TiDB Cloud (free tier)
      # - PlanetScale
      # Set the values in the Render dashboard (Environment tab).
      # DB_URL example: jdbc:mysql://HOST:PORT/DATABASE?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DRIVER
        value: com.mysql.cj.jdbc.Driver

      # EMAIL Configuration (Gmail)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # GOOGLE OAuth (Optional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
