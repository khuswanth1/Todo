<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark Tech Radial Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="60%" stop-color="#05070c" />
      <stop offset="100%" stop-color="#010204" />
    </radialGradient>

    <!-- Crystal Facet Gradients (Simulating Refraction) -->
    <linearGradient id="facetLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.4" />
    </linearGradient>

    <linearGradient id="facetRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.4" />
    </linearGradient>

    <linearGradient id="facetTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.5" />
    </linearGradient>

    <linearGradient id="facetBottom" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.5" />
    </linearGradient>

    <!-- Electric Neon Checkmark Gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="crystalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="30" flood-color="#4f46e5" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background App Icon Box -->
  <rect width="512" height="512" rx="140" fill="url(#bg)" />

  <!-- Ambient Light Orbs in Background -->
  <circle cx="160" cy="160" r="140" fill="#4f46e5" opacity="0.15" filter="url(#glow)" />
  <circle cx="350" cy="350" r="140" fill="#06b6d4" opacity="0.15" filter="url(#glow)" />

  <!-- Ambient Micro Particles -->
  <circle cx="180" cy="120" r="3" fill="#ffffff" opacity="0.3" />
  <circle cx="340" cy="380" r="2" fill="#38bdf8" opacity="0.4" />
  <circle cx="380" cy="150" r="2.5" fill="#f43f5e" opacity="0.3" />
  <circle cx="130" cy="370" r="3" fill="#a78bfa" opacity="0.4" />

  <!-- Refined 3D Faceted Crystal Core -->
  <g transform="translate(256, 256) scale(0.92)" filter="url(#crystalGlow)">
    <!-- Facets (Left, Right, Top, Bottom) -->
    <polygon points="0,0 -160,-60 0,-180" fill="url(#facetLeft)" />
    <polygon points="0,0 160,-60 0,-180" fill="url(#facetRight)" />
    <polygon points="0,0 -160,60 0,180" fill="url(#facetBottom)" opacity="0.9" />
    <polygon points="0,0 160,60 0,180" fill="url(#facetRight)" opacity="0.9" />

    <!-- Sharp Crystal Facet Borders (Wireframe Highlights) -->
    <polygon points="0,-180 -160,-60 0,0" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.4" />
    <polygon points="0,-180 160,-60 0,0" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.4" />
    <polygon points="0,180 -160,60 0,0" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.4" />
    <polygon points="0,180 160,60 0,0" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.4" />

    <!-- Outer Profile Rim Light -->
    <polygon points="0,-180 -160,-60 -160,60 0,180 160,60 160,-60" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.25" />

    <!-- Intersecting Futuristic Checkmark (Integrated inside the crystal structure) -->
    <g filter="url(#glow)">
      <path d="M -90,15 L -20,85 L 105,-40" 
            fill="none" stroke="url(#checkGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <!-- Bright inner core for checkmark glow -->
    <path d="M -90,15 L -20,85 L 105,-40" 
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Glossy Curved Reflection Mask (App Icon Style) -->
  <path d="M 0,0 L 512,0 L 512,180 C 350,220 160,180 0,260 Z" fill="#ffffff" opacity="0.04" />
</svg>
